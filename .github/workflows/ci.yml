name: MeshGate CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend Docker image
        run: docker build -t daviddigheji/meshgate-backend ./services/backend

      - name: Build frontend Docker image
        run: docker build -t daviddigheji/meshgate-frontend ./services/frontend

      - name: Push backend image
        run: docker push daviddigheji/meshgate-backend

      - name: Push frontend image
        run: docker push daviddigheji/meshgate-frontend

      - name: Validate Docker Compose file
        run: docker compose config